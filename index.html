<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Riyadoh Akad</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <div class="bg-indigo-600 p-6 text-center text-white">
            <h2 class="text-xl font-bold">Riyadoh Menuju Akad</h2>
            <p class="text-indigo-100 text-sm mt-1">Semoga Allah memberkahi ikhtiar kita</p>
        </div>
        
        <form id="riyadohForm" class="p-6 space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Siapa yang mengisi?</label>
                <select name="username" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                    <option value="Calon Suami">Calon Suami</option>
                    <option value="Sisi">Sisi (Calon Istri)</option>
                </select>
            </div>

            <hr>

            <div class="space-y-4">
                <label class="flex items-center space-x-3 bg-slate-50 p-3 rounded-lg border">
                    <input type="checkbox" name="istighfar" value="Sudah" class="w-5 h-5 text-indigo-600">
                    <span class="text-sm text-slate-700 font-medium">1. Istighfar 100x</span>
                </label>

                <div class="bg-slate-50 p-3 rounded-lg border space-y-2">
                    <span class="text-sm text-slate-700 font-medium block">2. Saum Sunnah hari ini?</span>
                    <div class="grid grid-cols-3 gap-2">
                        <label class="flex items-center text-xs"><input type="radio" name="saum" value="Ya" class="mr-1"> Ya</label>
                        <label class="flex items-center text-xs"><input type="radio" name="saum" value="Tidak" checked class="mr-1"> Tidak</label>
                        <label class="flex items-center text-xs text-pink-600 font-semibold"><input type="radio" name="saum" value="Sedang Haid" class="mr-1"> Sedang Haid</label>
                    </div>
                    <input type="text" name="keterangan_saum" placeholder="Jenis saum/Catatan" class="w-full mt-1 p-2 text-xs border rounded">
                </div>

                <label class="flex items-center space-x-3 bg-slate-50 p-3 rounded-lg border">
                    <input type="checkbox" name="doa_nikah" value="Sudah" class="w-5 h-5 text-indigo-600">
                    <span class="text-sm text-slate-700 font-medium">3. Doa Keberkahan Nikah</span>
                </label>

                <label class="flex items-center space-x-3 bg-slate-50 p-3 rounded-lg border">
                    <input type="checkbox" name="one_day_ayat" value="Sudah" class="w-5 h-5 text-indigo-600">
                    <span class="text-sm text-slate-700 font-medium">4. One Day One Ayat</span>
                </label>

                <div class="bg-slate-50 p-3 rounded-lg border space-y-2">
                    <span class="text-sm text-slate-700 font-medium block">5. Tahajud Malam Ini?</span>
                    <div class="grid grid-cols-3 gap-2">
                        <label class="flex items-center text-xs"><input type="radio" name="tahajud" value="Ya" class="mr-1"> Ya</label>
                        <label class="flex items-center text-xs"><input type="radio" name="tahajud" value="Tidak" checked class="mr-1"> Tidak</label>
                        <label class="flex items-center text-xs text-pink-600 font-semibold"><input type="radio" name="tahajud" value="Sedang Haid" class="mr-1"> Sedang Haid</label>
                    </div>
                </div>

                <label class="flex items-center space-x-3 bg-slate-50 p-3 rounded-lg border">
                    <input type="checkbox" name="doa_saur" value="Ya" class="w-5 h-5 text-indigo-600">
                    <span class="text-sm text-slate-700 font-medium">6. Berdoa di Waktu Sahur</span>
                </label>

                <div class="bg-slate-50 p-3 rounded-lg border space-y-2">
                    <span class="text-sm text-slate-700 font-medium block">7. Kata Mutiara Pernikahan?</span>
                    <div class="flex space-x-4">
                        <label class="flex items-center text-sm"><input type="radio" name="kata_mutiara" value="Sudah" class="mr-2"> Sudah</label>
                        <label class="flex items-center text-sm"><input type="radio" name="kata_mutiara" value="Belum" checked class="mr-2"> Belum</label>
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-indigo-700 transition">
                Simpan Laporan Hari Ini
            </button>
        </form>
        <p id="responseMsg" class="pb-6 text-center text-sm"></p>
    </div>

    <script>
       const scriptURL = 'https://script.google.com/macros/s/AKfycbzaOaqZYJ0jn1P9AtGtcuGwBIuns97baw33v8R0VYSL455ihnxPkzl2cwJfFLop0rAm/exec'; // GANTI INI
        const form = document.getElementById('riyadohForm');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('responseMsg');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true; btn.innerText = "Mengirim...";
            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            // Konversi checkbox yang kosong ke "Belum"
            const checkboxes = ['istighfar', 'doa_nikah', 'one_day_ayat', 'doa_saur'];
            checkboxes.forEach(name => {
                if(!data[name]) data[name] = "Belum";
            });

            fetch(scriptURL, { method: 'POST', body: JSON.stringify(data)})
            .then(() => {
                msg.innerText = "Alhamdulillah, data tersimpan! ❤️";
                msg.style.color = "green";
                form.reset();
            })
            .catch(error => {
                msg.innerText = "Gagal kirim, coba lagi ya.";
                msg.style.color = "red";
            })
            .finally(() => {
                btn.disabled = false; btn.innerText = "Simpan Laporan Hari Ini";
            });
        });
    </script>
</body>
</html>
